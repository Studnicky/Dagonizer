packages:
  - "packages/*"
  - "examples"
  - "examples/the-archivist"
  - "examples/the-cartographer"

# pnpm settings live here (read by pnpm, ignored by npm) so `npm run` does not
# warn "Unknown project config". shamefullyHoist flattens node_modules for tools
# that expect a hoisted layout.
shamefullyHoist: true
