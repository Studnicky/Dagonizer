<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-label="Node.js cohesive hex node">

  <defs>
    <linearGradient id="facetGreen" x1="92" y1="36" x2="308" y2="364" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8ECF69"/>
      <stop offset="0.48" stop-color="#65A85D"/>
      <stop offset="1" stop-color="#2F7E39"/>
    </linearGradient>
    <linearGradient id="facetBlue" x1="92" y1="36" x2="308" y2="364" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#58A9E6"/>
      <stop offset="0.5" stop-color="#317FC4"/>
      <stop offset="1" stop-color="#005A9C"/>
    </linearGradient>
    <linearGradient id="facetBlack" x1="92" y1="36" x2="308" y2="364" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3A3A3A"/>
      <stop offset="0.56" stop-color="#222222"/>
      <stop offset="1" stop-color="#050505"/>
    </linearGradient>
    <linearGradient id="facetWhite" x1="92" y1="36" x2="308" y2="364" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.52" stop-color="#F4F6F8"/>
      <stop offset="1" stop-color="#D8DEE5"/>
    </linearGradient>
    <linearGradient id="facetGold" x1="92" y1="36" x2="308" y2="364" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FCEE21"/>
      <stop offset="0.52" stop-color="#F9B233"/>
      <stop offset="1" stop-color="#E36D12"/>
    </linearGradient>
    <linearGradient id="facetRed" x1="92" y1="36" x2="308" y2="364" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF5A4E"/>
