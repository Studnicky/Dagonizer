<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-label="JSON-LD linked data format node">

  <defs>
    <linearGradient id="facetGold" x1="86" y1="32" x2="314" y2="368" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4a3200"/>
      <stop offset="0.50" stop-color="#2e1f00"/>
      <stop offset="1" stop-color="#0f0a00"/>
    </linearGradient>
    <filter id="nodeShadow" x="-35%" y="-35%" width="170%" height="170%">
      <feDropShadow dx="0" dy="12" stdDeviation="11" flood-color="#000000" flood-opacity="0.30"/>
    </filter>
    <style>
      .round { stroke-linecap: round; stroke-linejoin: round; }
      .monoText { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-weight: 900; }
      .markText { font-family: "Segoe UI", Arial, Helvetica, sans-serif; font-weight: 700; }
    </style>
  </defs>

  <g id="jsonld-node">

    <g id="node-body" filter="url(#nodeShadow)">
      <path id="node-base"         d="M200 24 L352.42 112 L352.42 288 L200 376 L47.58 288 L47.58 112 Z" fill="url(#facetGold)" stroke="#d4a649" stroke-width="4"/>
      <path id="facet-top-left"    d="M200 24 L47.58 112 L112 149 L200 98 Z"       fill="#FFFFFF" opacity="0.08"/>
      <path id="facet-top-right"   d="M200 24 L352.42 112 L288 149 L200 98 Z"      fill="#FFFFFF" opacity="0.05"/>
      <path id="facet-lower-left"  d="M47.58 112 L112 149 L200 376 L47.58 288 Z"   fill="#000000" opacity="0.14"/>
      <path id="facet-lower-right" d="M352.42 112 L288 149 L200 376 L352.42 288 Z" fill="#000000" opacity="0.20"/>
      <path id="facet-center"      d="M112 149 L200 98 L288 149 L200 376 Z"        fill="#FFFFFF" opacity="0.05"/>
    </g>

    <!-- JSON-LD mark: curly braces with @-symbol -->
    <text class="monoText" x="200" y="200" text-anchor="middle" font-size="80" fill="#d4a649" opacity="0.95">{ @ }</text>
    <text class="monoText" x="200" y="272" text-anchor="middle" font-size="36" fill="#d4a649" opacity="0.80">JSON-LD</text>

  </g>

</svg>
