<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Dagonizer — Omniscient orchestration for directed acyclic graphs">

  <defs>
    <!-- Deep oceanic gradient matching Dagonizer's #0a0e1a dark theme -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0"   stop-color="#0a0e1a"/>
      <stop offset="0.5" stop-color="#0d1220"/>
      <stop offset="1"   stop-color="#0f1628"/>
    </linearGradient>

    <!-- Cyan glow for the hexagon and nodes -->
    <linearGradient id="hexGrad" x1="100" y1="80" x2="340" y2="540" gradientUnits="userSpaceOnUse">
      <stop offset="0"   stop-color="#22e8ff" stop-opacity="0.9"/>
      <stop offset="0.5" stop-color="#0eb8d8"/>
      <stop offset="1"   stop-color="#0890a8"/>
    </linearGradient>

    <!-- Violet accent for DAG edges -->
    <linearGradient id="edgeGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22e8ff" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#b18cff" stop-opacity="0.7"/>
    </linearGradient>

    <!-- Node glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Hex shadow -->
    <filter id="hexShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#22e8ff" flood-opacity="0.25"/>
    </filter>

    <style>
      .title {
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-weight: 800;
        letter-spacing: -0.02em;
        fill: #e8f4ff;
      }
      .tagline {
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-weight: 500;
        fill: #22e8ff;
        opacity: 0.85;
      }
      .meta {
        font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        font-weight: 500;
        fill: #8ab4cc;
        opacity: 0.65;
      }
      .nodeLabel {
        font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        font-weight: 700;
        fill: #0a0e1a;
        font-size: 11px;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines — oceanic depth effect -->
  <g opacity="0.04" stroke="#22e8ff" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="150" y1="0" x2="150" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>

  <!-- Left panel: large hexagonal talisman icon (SVG primitive rendering) -->
  <!-- Outer hex: flat-top, centered at (215, 315), radius 195 -->
  <g transform="translate(215, 315)" filter="url(#hexShadow)">
    <!-- Hex faces — built from flat-top hex with r=195 -->
    <!-- Vertices: (0,-195) (169,-97.5) (169,97.5) (0,195) (-169,97.5) (-169,-97.5) -->
    <polygon
      points="0,-195 169,-97.5 169,97.5 0,195 -169,97.5 -169,-97.5"
      fill="none"
      stroke="url(#hexGrad)"
      stroke-width="4"
      opacity="0.9"
    />
    <!-- Inner hex face fill (dark) -->
    <polygon
      points="0,-195 169,-97.5 169,97.5 0,195 -169,97.5 -169,-97.5"
      fill="#0a0e1a"
      opacity="0.7"
    />
    <!-- Top face highlight -->
    <polygon
      points="0,-195 169,-97.5 0,-50 -169,-97.5"
      fill="#22e8ff"
      opacity="0.08"
    />

    <!-- DAG nodes within hex — 5-node topology: source → [A,B] → [C] → sink -->
    <!-- source node @ (0, -110) -->
    <circle cx="0" cy="-110" r="18" fill="#22e8ff" filter="url(#glow)" opacity="0.95"/>
    <text class="nodeLabel" x="0" y="-107" text-anchor="middle">S</text>

    <!-- A @ (-70, -20) -->
    <circle cx="-70" cy="-20" r="16" fill="#b18cff" filter="url(#glow)" opacity="0.9"/>
    <text class="nodeLabel" x="-70" y="-17" text-anchor="middle">A</text>

    <!-- B @ (70, -20) -->
    <circle cx="70" cy="-20" r="16" fill="#b18cff" filter="url(#glow)" opacity="0.9"/>
    <text class="nodeLabel" x="70" y="-17" text-anchor="middle">B</text>

    <!-- C (fan-in) @ (0, 75) -->
    <circle cx="0" cy="75" r="18" fill="#22e8ff" filter="url(#glow)" opacity="0.95"/>
    <text class="nodeLabel" x="0" y="78" text-anchor="middle">C</text>

    <!-- sink @ (0, 155) — near bottom vertex -->
    <circle cx="0" cy="155" r="14" fill="#0eb8d8" filter="url(#glow)" opacity="0.85"/>
    <text class="nodeLabel" x="0" y="158" text-anchor="middle">∎</text>

    <!-- Edges: source→A, source→B, A→C, B→C, C→sink -->
    <g stroke="#22e8ff" stroke-width="2" stroke-opacity="0.55" fill="none" marker-end="url(#arr)">
      <line x1="0" y1="-92" x2="-62" y2="-36"/>
      <line x1="0" y1="-92" x2="62" y2="-36"/>
      <line x1="-60" y1="-6" x2="-10" y2="59"/>
      <line x1="60" y1="-6" x2="10" y2="59"/>
      <line x1="0" y1="93" x2="0" y2="141"/>
    </g>

    <!-- Arrowhead marker (defined inline via path for compat) -->
    <g stroke="#22e8ff" stroke-width="1.5" stroke-opacity="0.7">
      <!-- arrowheads as tiny triangles at line ends -->
      <polygon points="-62,-36 -68,-44 -54,-42" fill="#22e8ff" opacity="0.7"/>
      <polygon points="62,-36 54,-44 68,-42" fill="#22e8ff" opacity="0.7"/>
      <polygon points="-10,59 -16,51 -2,53" fill="#22e8ff" opacity="0.7"/>
      <polygon points="10,59 2,51 16,53" fill="#22e8ff" opacity="0.7"/>
      <polygon points="0,141 -6,133 6,133" fill="#22e8ff" opacity="0.7"/>
    </g>
  </g>

  <!-- Right panel: title + tagline -->
  <g transform="translate(470, 235)">
    <text class="title" x="0" y="0" font-size="82">Dagonizer</text>
    <text class="tagline" x="0" y="58" font-size="27">Omniscient orchestration for</text>
    <text class="tagline" x="0" y="93" font-size="27">directed acyclic graphs.</text>
    <text class="meta" x="0" y="168" font-size="21">Type-safe · abortable · deterministic resume.</text>
  </g>

  <!-- Bottom-right: subtle URL brand -->
  <text
    font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace"
    font-size="16"
    fill="#22e8ff"
    opacity="0.3"
    x="1150"
    y="610"
    text-anchor="end"
  >studnicky.github.io/Dagonizer</text>

</svg>
