name: Release

# Two-stage flow per RFC 0001 Phase 8:
#
#   1. On push to main: open or update a "Version Packages" PR via
#      changesets. The PR aggregates every accumulated changeset,
#      bumps each affected package's version, regenerates per-package
#      CHANGELOGs, and refreshes the lockfile.
#   2. When that PR merges: each package whose version differs from
#      the npm registry gets published. Tags are pushed for each
#      released package (e.g. `@noocodex/dagonizer-adapter-groq@0.1.1`).
#
# Independent versioning: a bug fix to one adapter bumps that package
# only; other packages stay where they are.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Version + Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: CI gate (typecheck + lint + tests + adapter smoke)
        run: pnpm run ci

      # v0.10.0 ships GitHub-only; npm publish is intentionally skipped
      # until live-API smoke testing covers every adapter. Re-enable by
      # adding `publish: pnpm run release` and `NPM_TOKEN` to the env.
      - name: Create Release Pull Request
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm run version-packages
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
