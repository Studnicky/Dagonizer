name: Release

# Two-stage flow per RFC 0001 Phase 8:
#
#   1. On push to main: open or update a "Version Packages" PR via
#      changesets. The PR aggregates every accumulated changeset,
#      bumps each affected package's version, regenerates per-package
#      CHANGELOGs, and refreshes the lockfile.
#   2. When that PR merges: each package whose version differs from
#      the GitHub Packages registry gets published. Tags are pushed for
#      each released package (e.g. `@studnicky/dagonizer@0.16.0`).
#
# All packages publish to GitHub Packages (https://npm.pkg.github.com).
# Packages are scoped to @studnicky and the fixed-group lockstep ensures
# every package in the monorepo releases together on each minor/major bump.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write
  packages: write
  id-token: write

jobs:
  release:
    name: Version + Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://npm.pkg.github.com'
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: CI gate (typecheck + lint + tests + adapter smoke)
        run: pnpm run ci

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm run version-packages
          publish: pnpm exec changeset publish
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
